<!DOCTYPE html>
<html lang="pt-BR" data-class="guerreiro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Anahí — Metroidvania pixel art brasileiro. Fauna, flora e folclore tratados com respeito. Ipê Arc Studios.">
  <title>Cadastro — Anahí · Ipê Arc Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/style.css">
  <script type="module" src="./script/main.js"></script>
</head>
<body data-page="cadastro">

  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>
  <div id="journey-wrap" role="progressbar" aria-label="Progresso da Jornada" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <div id="journey-fill"></div>
    <span id="journey-label" class="sr-only">Jornada: 0%</span>
  </div>

  <!-- Header injetado por script/modules/layout.js -->
  <div id="site-header"></div>

  <main>
    <section id="cadastro" class="section section--alt" aria-labelledby="cadastro-title"><div class="section-inner section-inner--narrow"><header class="section-header"><p class="section-eyebrow">// NOVA JORNADA</p><h2 id="cadastro-title" class="section-title">INICIAR JORNADA</h2><p class="section-desc">Registre-se para acompanhar o desenvolvimento e garantir acesso antecipado</p></header><form id="cadastro-form" class="pixel-form" novalidate aria-label="Formulário de cadastro"><div class="form-group"><label for="reg-name" class="form-label">NOME DO JOGADOR *</label><input type="text" id="reg-name" name="name" class="form-input" placeholder="Seu nome de guerreiro" autocomplete="name" required aria-required="true" aria-describedby="reg-name-error"><span class="form-error" id="reg-name-error" role="alert"></span></div><div class="form-group"><label for="reg-email" class="form-label">E-MAIL *</label><input type="email" id="reg-email" name="email" class="form-input" placeholder="email@exemplo.com" autocomplete="email" required aria-required="true" aria-describedby="reg-email-error"><span class="form-error" id="reg-email-error" role="alert"></span></div><div class="form-group"><label for="reg-phone" class="form-label">NÚMERO (Opcional)</label><input type="tel" id="reg-phone" name="phone" class="form-input" placeholder="(00) 00000-0000" autocomplete="tel" aria-describedby="reg-phone-hint reg-phone-error"><span id="reg-phone-hint" class="form-hint">Formato: (00) 00000-0000</span><span class="form-error" id="reg-phone-error" role="alert"></span></div><div class="form-group"><label for="reg-birth" class="form-label">DATA DE NASCIMENTO *</label><input type="date" id="reg-birth" name="birth" class="form-input" required aria-required="true" aria-describedby="reg-birth-error"><span class="form-error" id="reg-birth-error" role="alert"></span></div><div class="form-group"><p class="form-label" id="class-radio-label">CLASSE INICIAL</p><div class="form-class-radios" role="group" aria-labelledby="class-radio-label"><label class="class-radio"><input type="radio" name="reg-class" value="guerreiro" checked><span class="class-radio__display">⚔ Guerreiro</span></label><label class="class-radio"><input type="radio" name="reg-class" value="arqueiro"><span class="class-radio__display">🏹 Arqueiro</span></label><label class="class-radio"><input type="radio" name="reg-class" value="curandeiro"><span class="class-radio__display">🌿 Curandeiro</span></label></div></div><button type="submit" class="btn btn--primary btn--full btn--lg">▶ INICIAR NOVA JORNADA</button></form></div></section>
  </main>

  <!-- Footer injetado por script/modules/layout.js -->
  <div id="site-footer"></div>

</body>
</html>
